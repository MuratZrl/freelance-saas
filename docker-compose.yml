# Docker Compose file for PostgreSQL database

version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: freelance-saas-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: freelance_saas
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: